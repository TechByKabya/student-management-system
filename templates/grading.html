{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-8 flex items-center justify-between">
        <div>
            <h2 class="text-3xl font-bold text-gray-900 tracking-tight">Student Grading</h2>
            <p class="text-gray-500 mt-2 text-lg">Programming & Problem Solving Lab - <span
                    class="text-indigo-600 font-bold">{{ student.name }} ({{ student.school_id }})</span></p>
        </div>
        <a href="{{ url_for('grading') }}" class="text-gray-500 hover:text-indigo-600 transition-colors font-semibold">
            <i class="fa-solid fa-arrow-left mr-1"></i> Back to List
        </a>
    </div>

    <form action="{{ url_for('grading', student_id=student.id) }}" method="POST">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Quizzes Section -->
            <div class="glass-panel p-8 rounded-2xl shadow-lg border border-gray-200 bg-white/70">
                <h3 class="text-xl font-bold text-gray-800 mb-6 flex items-center border-b pb-4">
                    <i class="fa-solid fa-pen-nib mr-3 text-indigo-500"></i> Quizzes (Max 15 each)
                </h3>
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-gray-600 mb-1">Quiz 1</label>
                        <input type="number" step="0.1" name="q1" value="{{ student.q1 }}" max="15" min="0"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-indigo-500 focus:border-indigo-500 bg-white/80 font-mono shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-600 mb-1">Quiz 2</label>
                        <input type="number" step="0.1" name="q2" value="{{ student.q2 }}" max="15" min="0"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-indigo-500 focus:border-indigo-500 bg-white/80 font-mono shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-600 mb-1">Quiz 3</label>
                        <input type="number" step="0.1" name="q3" value="{{ student.q3 }}" max="15" min="0"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-indigo-500 focus:border-indigo-500 bg-white/80 font-mono shadow-sm">
                    </div>
                </div>
            </div>

            <!-- Other Assessments Section -->
            <div class="glass-panel p-8 rounded-2xl shadow-lg border border-gray-200 bg-white/70">
                <h3 class="text-xl font-bold text-gray-800 mb-6 flex items-center border-b pb-4">
                    <i class="fa-solid fa-ranking-star mr-3 text-purple-500"></i> Main Components
                </h3>
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-gray-600 mb-1">Presentation (Max 7)</label>
                        <input type="number" step="0.1" name="presentation" value="{{ student.presentation }}" max="7"
                            min="0"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-indigo-500 focus:border-indigo-500 bg-white/80 font-mono shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-600 mb-1">Mid Term (Max 25)</label>
                        <input type="number" step="0.1" name="mid" value="{{ student.mid }}" max="25" min="0"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-indigo-500 focus:border-indigo-500 bg-white/80 font-mono shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-600 mb-1">Final Exam (Max 40)</label>
                        <input type="number" step="0.1" name="final" value="{{ student.final }}" max="40" min="0"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-indigo-500 focus:border-indigo-500 bg-white/80 font-mono shadow-sm">
                    </div>
                </div>
            </div>
        </div>

        <!-- Grade Summary & Submit -->
        <div
            class="mt-10 glass-panel p-8 rounded-2xl shadow-2xl border-2 border-indigo-100 bg-indigo-50/50 flex flex-col md:flex-row items-center justify-between gap-6">
            <div>
                <h4 class="text-lg font-bold text-indigo-900 border-l-4 border-indigo-600 pl-3">Grading Rules</h4>
                <p class="text-sm text-indigo-700 mt-1">Average of 3 quizzes is used. Passing score is &ge; 40 / 100.
                </p>
            </div>
            <button type="submit"
                class="w-full md:w-auto px-10 py-4 bg-indigo-600 text-white rounded-xl font-bold text-lg hover:bg-indigo-700 shadow-xl transition-all transform hover:-translate-y-1">
                Save Grade Changes <i class="fa-solid fa-floppy-disk ml-2"></i>
            </button>
        </div>
    </form>
</div>
{% endblock %}
